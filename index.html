<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Runner Pro</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #000510, #001530); overflow: hidden; }
        
        /* КИБЕР-ЧЕЛОВЕЧЕК (Добавили стилизацию) */
        #player { 
            position: absolute; bottom: 30px; left: 50%; 
            width: 40px; height: 60px; transform: translateX(-50%);
            z-index: 5; transition: left 0.05s linear;
            display: none; /* Скрыт до старта */
        }
        /* Части тела человечка */
        .p-head { position: absolute; top: 0; left: 10px; width: 20px; height: 20px; background: #0ff; border-radius: 50%; box-shadow: 0 0 15px #0ff; }
        .p-body { position: absolute; top: 22px; left: 5px; width: 30px; height: 25px; background: #0ff; border-radius: 5px; }
        .p-leg { position: absolute; bottom: 0; width: 8px; height: 15px; background: #0ff; }
        .p-leg.l { left: 8px; } .p-leg.r { right: 8px; }

        /* Кристаллы */
        .item { position: absolute; width: 30px; height: 30px; border-radius: 50%; z-index: 4; }
        .crystal { background: #f0f; box-shadow: 0 0 20px #f0f; }

        /* Интерфейс */
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; font-size: 16px; display: none; text-shadow: 0 0 5px #000; }
        #timer-ui { position: absolute; top: 15px; right: 15px; color: #0f0; z-index: 10; font-size: 16px; display: none; text-shadow: 0 0 5px #000; }
        
        /* Экраны */
        .overlay { position: absolute; text-align: center; z-index: 20; background: rgba(0,0,0,0.85); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 18px 40px; background: #0ff; color: #000; border: none; border-radius: 35px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px #0ff; margin: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        #ad-button { background: #f0f; box-shadow: 0 0 25px #f0f; display: none; }
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
<audio id="catch-sound" src="https://cdn.pixabay.com/audio/2022/03/19/audio_1332414777.mp3"></audio>

<div id="game-container">
    <div id="start-screen" class="overlay">
        <h1 style="color: #0ff; text-shadow: 0 0 15px #0ff;">CYBER RUNNER</h1>
        <p>Собирай кристаллы, избегай падения!</p>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
    </div>

    <div id="ui">Кристаллы: <span id="score">0</span><br>Рекорд: <span id="high-score">0</span></div>
    <div id="timer-ui">Время: <span id="timer">0</span> сек.</div>
    
    <div id="player">
        <div class="p-head"></div>
        <div class="p-body"></div>
        <div class="p-leg l"></div>
        <div class="p-leg r"></div>
    </div>

    <div id="death-screen" class="overlay" style="display: none;">
        <h2 id="death-msg" style="color: #f0f;">ИГРА ОКОНЧЕНА</h2>
        <p id="final-stats"></p>
        <button id="ad-button" class="btn" onclick="showAd()">⚡ ВОСКРЕСНУТЬ ЗА РЕКЛАМУ</button>
        <button class="btn" style="background: #555; color: #fff;" onclick="resetGame()">ЗАНОВО</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('high-score');
    const timerElement = document.getElementById('timer');
    const deathScreen = document.getElementById('death-screen');
    const adButton = document.getElementById('ad-button');
    const startScreen = document.getElementById('start-screen');
    const bgMusic = document.getElementById('bg-music');
    const catchSound = document.getElementById('catch-sound');

    let score = 0, seconds = 0, gameActive = false, currentSpeed = 5;
    let spawnInterval, timeInterval;

    // Загрузка рекорда
    highScoreElement.innerText = localStorage.getItem('cyberHS') || 0;

    function startGame() {
        startScreen.style.display = 'none';
        deathScreen.style.display = 'none';
        player.style.display = 'block';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('timer-ui').style.display = 'block';
        
        // Включаем музыку (некоторые браузеры блокируют автоплей)
        bgMusic.play().catch(() => console.log("Музыка ждет клика"));
        
        gameActive = true;
        score = 0; seconds = 0; currentSpeed = 5;
        scoreElement.innerText = '0';
        timerElement.innerText = '0';
        
        clearInterval(spawnInterval);
        clearInterval(timeInterval);
        
        spawnInterval = setInterval(createCrystal, 1200);
        startTimer();
    }

    // Управление
    document.addEventListener('touchmove', (e) => {
        if (!gameActive) return;
        let x = e.touches[0].clientX - 20;
        x = Math.max(0, Math.min(x, window.innerWidth - 40));
        player.style.left = x + 'px';
    });

    function createCrystal() {
        if (!gameActive) return;
        const crystal = document.createElement('div');
        crystal.className = 'item crystal';
        crystal.style.left = Math.random() * (window.innerWidth - 30) + 'px';
        crystal.style.top = '-40px';
        document.getElementById('game-container').appendChild(crystal);

        let top = -40;
        function fall() {
            if (!gameActive) { crystal.remove(); return; }
            top += currentSpeed;
            crystal.style.top = top + 'px';

            let pR = player.getBoundingClientRect(), cR = crystal.getBoundingClientRect();
            if (cR.bottom > pR.top && cR.left < pR.right && cR.right > pR.left && cR.top < pR.bottom) {
                score++; 
                scoreElement.innerText = score; 
                crystal.remove();
                catchSound.currentTime = 0; catchSound.play(); // Звук сбора
                return;
            }

            if (top > window.innerHeight) { crystal.remove(); gameOver(); }
            else { requestAnimationFrame(fall); }
        }
        fall();
    }

    function startTimer() {
        timeInterval = setInterval(() => {
            if (gameActive) {
                seconds++; timerElement.innerText = seconds;
                if (seconds % 10 === 0) currentSpeed += 0.8;
            }
        }, 1000);
    }

    function gameOver() {
        gameActive = false;
        clearInterval(spawnInterval);
        clearInterval(timeInterval);
        bgMusic.pause(); // Приостановим музыку

        let hs = localStorage.getItem('cyberHS') || 0;
        if (score > hs) {
            localStorage.setItem('cyberHS', score);
            highScoreElement.innerText = score;
        }
        
        document.getElementById('final-stats').innerText = `Кристаллов: ${score} | Время: ${seconds} сек.`;
        deathScreen.style.display = 'flex';
        adButton.style.display = 'block'; // Показываем кнопку рекламы
    }

    function resetGame() {
        location.reload(); // Для кнопки "Заново" - полная перезагрузка
    }

    // РЕКЛАМА И ВОСКРЕШЕНИЕ (ID: 25872)
    const AdController = window.AdsGram.init({ blockId: "25872" });

    function showAd() {
        adButton.innerText = "ЗАГРУЗКА...";
        AdController.show().then(() => {
            // ВОСКРЕШЕНИЕ: Продолжаем игру
            deathScreen.style.display = 'none';
            player.style.display = 'block';
            bgMusic.play();
            gameActive = true;
            adButton.style.display = 'none'; // Скрываем рекламу, чтобы не смотреть дважды за раз
            adButton.innerText = "⚡ ВОСКРЕСНУТЬ ЗА РЕКЛАМУ";
            
            spawnInterval = setInterval(createCrystal, 1200);
            startTimer(); // Время и скорость продолжают расти
        }).catch(() => {
            alert("Реклама не готова. Попробуем заново.");
            location.reload();
        });
    }
</script>

</body>
</html>
