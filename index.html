<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Runner Pro</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #000510, #001530); }
        
        #player { 
            position: absolute; bottom: 30px; left: 50%; 
            width: 60px; height: 60px; transform: translateX(-50%);
            background: #0ff; border-radius: 12px; box-shadow: 0 0 25px #0ff;
            transition: left 0.05s linear;
        }

        .item { position: absolute; width: 35px; height: 35px; border-radius: 50%; }
        .crystal { background: #f0f; box-shadow: 0 0 20px #f0f; }

        /* Интерфейс */
        #ui-left { position: absolute; top: 15px; left: 15px; color: #fff; z-index: 10; font-size: 16px; line-height: 1.4; }
        #ui-right { position: absolute; top: 15px; right: 15px; text-align: right; color: #0f0; z-index: 10; font-size: 16px; }
        
        #best-score { color: #ff0; font-weight: bold; font-size: 14px; }

        #ad-button { 
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 35px; background: #f0f; color: #fff; border: none; 
            border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; display: none;
            box-shadow: 0 0 30px #f0f; z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-left">
        Кристаллы: <span id="score">0</span><br>
        <span id="best-score">Рекорд: <span id="high-score">0</span></span>
    </div>
    <div id="ui-right">
        Выживание: <span id="timer">0</span> сек.<br>
        Скорость: <span id="speed-display">x1</span>
    </div>
    
    <div id="player"></div>
    <button id="ad-button" onclick="showAd()">⚡ ВОСКРЕСНУТЬ ЗА РЕКЛАМУ</button>
</div>

<script>
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('high-score');
    const timerElement = document.getElementById('timer');
    const speedElement = document.getElementById('speed-display');
    const adButton = document.getElementById('ad-button');
    
    let score = 0;
    let seconds = 0;
    let gameActive = true;
    let currentSpeed = 5;
    let spawnRate = 1200;
    
    // Загружаем рекорд из памяти
    let savedHighScore = localStorage.getItem('cyberRunnerHighScore') || 0;
    highScoreElement.innerText = savedHighScore;

    // Управление
    document.addEventListener('touchmove', (e) => {
        if (!gameActive) return;
        let touch = e.touches[0];
        let x = touch.clientX - 30;
        if (x < 0) x = 0;
        if (x > window.innerWidth - 60) x = window.innerWidth - 60;
        player.style.left = x + 'px';
    });

    function createCrystal() {
        if (!gameActive) return;
        const crystal = document.createElement('div');
        crystal.classList.add('item', 'crystal');
        crystal.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        crystal.style.top = '-50px';
        document.getElementById('game-container').appendChild(crystal);

        let top = -50;
        function fall() {
            if (!gameActive) { crystal.remove(); return; }
            top += currentSpeed;
            crystal.style.top = top + 'px';

            let pRect = player.getBoundingClientRect();
            let cRect = crystal.getBoundingClientRect();

            if (cRect.bottom > pRect.top && cRect.left < pRect.right && cRect.right > pRect.left) {
                score++;
                scoreElement.innerText = score;
                crystal.remove();
                return;
            }

            if (top > window.innerHeight) {
                crystal.remove();
                gameOver();
            } else {
                requestAnimationFrame(fall);
            }
        }
        fall();
    }

    // Интервал появления предметов
    let spawnTimer = setInterval(createCrystal, spawnRate);

    // Таймер выживания и Ускорение каждые 10 сек
    const gameTimer = setInterval(() => {
        if (gameActive) {
            seconds++;
            timerElement.innerText = seconds;
            
            if (seconds % 10 === 0) {
                currentSpeed += 0.8;
                speedElement.innerText = "x" + (currentSpeed / 5).toFixed(1);
                
                // Ускоряем появление
                clearInterval(spawnTimer);
                spawnRate = Math.max(400, spawnRate - 100);
                spawnTimer = setInterval(createCrystal, spawnRate);
            }
        }
    }, 1000);

    function gameOver() {
        gameActive = false;
        clearInterval(spawnTimer);
        
        // Проверяем рекорд
        if (score > savedHighScore) {
            localStorage.setItem('cyberRunnerHighScore', score);
            highScoreElement.innerText = score;
            alert("НОВЫЙ РЕКОРД! 🏆 Ты собрал " + score + " кристаллов!");
        } else {
            alert("ИГРА ОКОНЧЕНА\nКристаллы: " + score + "\nВремя: " + seconds + " сек.");
        }
        
        adButton.style.display = 'block';
    }

    // ИНИЦИАЛИЗАЦИЯ ADSGRAM (Вставь свой ID ниже!)
    const AdController = window.AdsGram.init({ blockId: "25872" });

    function showAd() {
        AdController.show().then(() => {
            location.reload(); // Перезапуск после рекламы
        }).catch((err) => {
            console.log("Ad Error", err);
            location.reload(); 
        });
    }
</script>

</body>
</html>
