<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Evolution: Neon Rain</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk"></script>
    <style>
        body { margin: 0; background: #050510; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; user-select: none; }
        #game-container { display: none; flex-direction: column; align-items: center; justify-content: space-around; height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* Кнопка звука */
        #music-btn { position: absolute; top: 15px; right: 15px; font-size: 22px; cursor: pointer; z-index: 1000; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        #score { font-size: 42px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 15px rgba(0,255,204,0.4); }
        .bar-bg { width: 100%; height: 6px; background: #1a1a2e; border-radius: 3px; margin: 4px 0; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ff6600); transition: 0.3s; }
        #evo-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.5s; }

        #main-obj { width: 190px; height: 190px; display: flex; align-items: center; justify-content: center; font-size: 85px; cursor: pointer; transition: transform 0.05s; position: relative; }
        #main-obj:active { transform: scale(0.9); }
        #main-obj::before { content: ''; position: absolute; width: 140%; height: 140%; background: radial-gradient(circle, rgba(0,255,204,0.05) 0%, transparent 70%); z-index: -1; }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 5px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .ad-btn { grid-column: span 2; background: linear-gradient(135deg, #7700ff, #ff00ff); border: none; font-weight: bold; height: 48px; box-shadow: 0 4px 15px rgba(119, 0, 255, 0.3); }

        .click-text { position: absolute; font-weight: bold; animation: floatUp 0.8s ease-out forwards; pointer-events: none; z-index: 200; }
        .crit { color: #ffcc00; font-size: 32px; text-shadow: 0 0 10px gold; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1.2); } 100% { opacity: 0; transform: translateY(-120px) scale(0.8); } }
    </style>
</head>
<body>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <div id="music-btn" onclick="toggleMusic()">🔇</div>

    <div id="intro-screen" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px;">
        <h1 style="color:#00ffcc; letter-spacing:3px; margin-bottom:10px;">CYBER GENESIS</h1>
        <p style="color:#666; font-size:14px; margin-bottom:30px;">Эволюционируй. Кликай. Властвуй.</p>
        <button class="btn ad-btn" style="width:220px;" onclick="startGame()">ВОЙТИ В СИСТЕМУ</button>
    </div>

    <div id="game-container">
        <div id="daily-box" onclick="claimDaily()" style="color:#00ffcc; border:1px solid rgba(0,255,204,0.3); padding:6px 20px; border-radius:20px; font-size:12px; background: rgba(0,255,204,0.05);">🎁 Ежедневный бонус</div>
        
        <div style="width:100%; margin-top:10px;">
            <div id="era-label" style="font-size:12px; color:#ff00ff; text-transform:uppercase; letter-spacing:2px; margin-bottom:5px;">Эра: Зарождение</div>
            <div id="score">0</div>
            <div class="bar-bg"><div id="evo-fill"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:10px; color:#aaa;"><span>Энергия</span><span id="en-percent">100%</span></div>
            <div class="bar-bg"><div id="energy-fill"></div></div>
        </div>

        <div id="main-obj" onclick="clickObj(event)">💎</div>

        <div class="shop-grid">
            <button id="up1" class="btn" onclick="buy(1)">💪 СИЛА КЛИКА<br><span id="p-price">50</span> 💰</button>
            <button id="up2" class="btn" onclick="buy(2)">🤖 АВТО-КЛИК<br><span id="a-price">200</span> 💰</button>
            <button id="ad-btn" class="btn ad-btn" onclick="showAd()">📺 СМОТРЕТЬ РЕКЛАМУ (+500 💰)</button>
        </div>
    </div>

    <script>
        let coins = 0; let power = 1; let auto = 0;
        let pPrice = 50; let aPrice = 200;
        let energy = 100; let era = 1;
        let isMusicPlaying = false;
        const targets = [1000, 10000, 100000, 1000000, 99999999];
        const icons = ["💎", "🔋", "🦾", "🌌", "👑"];
        const eras = ["Зарождение", "Техно", "Киберпанк", "Сингулярность", "Божество"];
        const tg = window.Telegram.WebApp;

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if (isMusicPlaying) { m.pause(); btn.innerText = "🔇"; }
            else { m.play().catch(() => {}); btn.innerText = "🔊"; }
            isMusicPlaying = !isMusicPlaying;
        }

        function startGame() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                const m = document.getElementById('bg-music');
                m.volume = 0.5;
                m.play().then(() => { isMusicPlaying = true; document.getElementById('music-btn').innerText = "🔊"; }).catch(() => {});
                updateUI();
            }, 500);
        }

        function clickObj(e) {
            if (energy >= 1) {
                let gain = power;
                let isCrit = Math.random() < 0.05;
                if (isCrit) gain *= 10;
                coins += gain; energy -= 1;
                
                const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                
                const div = document.createElement('div');
                div.innerText = '+' + gain;
                div.className = 'click-text' + (isCrit ? ' crit' : '');
                div.style.left = x + 'px'; div.style.top = y + 'px';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 800);
                
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(isCrit ? 'heavy' : 'light');
                updateUI();
            } else {
                tg.showAlert("Энергия на нуле! Подождите или посмотрите рекламу.");
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(coins);
            document.getElementById('main-obj').innerText = icons[era-1];
            document.getElementById('era-label').innerText = "Эра: " + eras[era-1];
            document.getElementById('energy-fill').style.width = energy + '%';
            document.getElementById('en-percent').innerText = Math.floor(energy) + '%';
            document.getElementById('evo-fill').style.width = Math.min((coins/targets[era-1]*100), 100) + '%';
            document.getElementById('p-price').innerText = pPrice;
            document.getElementById('a-price').innerText = aPrice;
            
            if (coins >= targets[era-1] && era < 5) {
                era++; coins = 0; power *= 2;
                tg.showConfirm("ЭВОЛЮЦИЯ! Новая эра: " + eras[era-1]);
            }
        }

        setInterval(() => { if(energy < 100) energy += 0.2; if(auto > 0) coins += auto/10; updateUI(); }, 1000);

        function buy(t) {
            if(t===1 && coins>=pPrice){ coins-=pPrice; power+=1; pPrice=Math.floor(pPrice*2.5); updateUI(); }
            if(t===2 && coins>=aPrice){ coins-=aPrice; auto+=2; aPrice=Math.floor(aPrice*3); updateUI(); }
        }

        function showAd() {
            if (!window.AdsGram) { tg.showAlert("Загрузка рекламы..."); return; }
            const ad = window.AdsGram.init({ blockId: "25802" });
            ad.show().then(() => { coins += 500; energy = 100; updateUI(); })
            .catch(() => tg.showAlert("Реклама в проверке. Попробуйте позже!"));
        }
    </script>
</body>
</html>
