<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Runner Pro</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #000510, #001530); display: flex; justify-content: center; align-items: center; }
        
        /* Персонаж */
        #player { 
            position: absolute; bottom: 30px; left: 50%; 
            width: 50px; height: 50px; transform: translateX(-50%);
            background: #0ff; border-radius: 10px; box-shadow: 0 0 25px #0ff;
            z-index: 5; display: none;
        }

        /* Предметы */
        .item { position: absolute; width: 30px; height: 30px; border-radius: 50%; z-index: 4; }
        .crystal { background: #f0f; box-shadow: 0 0 15px #f0f; }

        /* Интерфейс */
        #ui { position: absolute; top: 15px; left: 15px; color: #fff; z-index: 10; font-size: 16px; display: none; }
        #timer-ui { position: absolute; top: 15px; right: 15px; color: #0f0; z-index: 10; font-size: 16px; display: none; }
        
        /* Экраны */
        .overlay { position: absolute; text-align: center; z-index: 20; color: white; background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 15px 40px; background: #0ff; color: #000; border: none; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #0ff; margin: 10px; }
        #ad-button { background: #f0f; box-shadow: 0 0 20px #f0f; display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="overlay">
        <h1>Cyber Runner</h1>
        <p>Собирай кристаллы и выживай!</p>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
    </div>

    <div id="ui">Кристаллы: <span id="score">0</span><br>Рекорд: <span id="high-score">0</span></div>
    <div id="timer-ui">Время: <span id="timer">0</span> сек.</div>
    
    <div id="player"></div>

    <div id="death-screen" class="overlay" style="display: none;">
        <h2 id="death-msg">ИГРА ОКОНЧЕНА</h2>
        <button id="ad-button" class="btn" onclick="showAd()">⚡ ВОСКРЕСНУТЬ ЗА РЕКЛАМУ</button>
        <button class="btn" style="background: #555; color: #fff;" onclick="location.reload()">ЗАНОВО</button>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const deathScreen = document.getElementById('death-screen');
    const adButton = document.getElementById('ad-button');
    const startScreen = document.getElementById('start-screen');

    let score = 0, seconds = 0, gameActive = false, currentSpeed = 5;
    let spawnInterval;

    // Загрузка рекорда
    document.getElementById('high-score').innerText = localStorage.getItem('hs') || 0;

    function startGame() {
        startScreen.style.display = 'none';
        player.style.display = 'block';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('timer-ui').style.display = 'block';
        gameActive = true;
        spawnInterval = setInterval(createCrystal, 1200);
        startTimer();
    }

    // Управление
    document.addEventListener('touchmove', (e) => {
        if (!gameActive) return;
        let x = e.touches[0].clientX - 25;
        x = Math.max(0, Math.min(x, window.innerWidth - 50));
        player.style.left = x + 'px';
    });

    function createCrystal() {
        if (!gameActive) return;
        const crystal = document.createElement('div');
        crystal.className = 'item crystal';
        crystal.style.left = Math.random() * (window.innerWidth - 30) + 'px';
        crystal.style.top = '-40px';
        document.getElementById('game-container').appendChild(crystal);

        let top = -40;
        function fall() {
            if (!gameActive) { crystal.remove(); return; }
            top += currentSpeed;
            crystal.style.top = top + 'px';

            let pR = player.getBoundingClientRect(), cR = crystal.getBoundingClientRect();
            if (cR.bottom > pR.top && cR.left < pR.right && cR.right > pR.left) {
                score++; scoreElement.innerText = score; crystal.remove(); return;
            }

            if (top > window.innerHeight) { crystal.remove(); gameOver(); }
            else { requestAnimationFrame(fall); }
        }
        fall();
    }

    function startTimer() {
        setInterval(() => {
            if (gameActive) {
                seconds++; timerElement.innerText = seconds;
                if (seconds % 10 === 0) currentSpeed += 0.7;
            }
        }, 1000);
    }

    function gameOver() {
        gameActive = false;
        clearInterval(spawnInterval);
        
        let hs = localStorage.getItem('hs') || 0;
        if (score > hs) localStorage.setItem('hs', score);
        
        document.getElementById('death-msg').innerText = "ТВОЙ СЧЕТ: " + score;
        deathScreen.style.display = 'flex';
        adButton.style.display = 'block';
    }

    // РЕКЛАМА (ID: 25872)
    const AdController = window.AdsGram.init({ blockId: "25872" });

    function showAd() {
        AdController.show().then(() => {
            location.reload(); 
        }).catch(() => {
            alert("Реклама не готова, попробуй позже");
            location.reload();
        });
    }
</script>

</body>
</html>
