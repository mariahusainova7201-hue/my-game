<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Forest Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-image: url('https://files.oaiusercontent.com/file-77e1cb0b-8d47-4c61-8df6-8311a0fe21e5'); 
            background-size: cover; background-position: center;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; text-align: center;
        }
        #game-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; height: 100vh;
            background: rgba(0, 0, 0, 0.3);
        }
        #score-box { margin-top: 50px; }
        #score { font-size: 60px; font-weight: 900; text-shadow: 0 0 20px #00ffcc; }
        #power-text { font-size: 14px; color: #00ffcc; opacity: 0.8; }
        
        #click-area {
            width: 210px; height: 210px;
            background: radial-gradient(circle, #ff00ff, #7700ff);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 90px;
            box-shadow: 0 0 50px rgba(119, 0, 255, 0.7);
            cursor: pointer; transition: transform 0.05s;
            user-select: none; position: relative;
        }
        #click-area:active { transform: scale(0.92); }

        /* Стиль вылетающей монеты */
        .coin-particle {
            position: absolute; color: #FFD700; font-weight: bold;
            font-size: 30px; pointer-events: none;
            text-shadow: 0 0 10px #FFD700;
            animation: moveCoin 0.8s ease-out forwards;
        }
        @keyframes moveCoin {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(0.5); opacity: 0; }
        }

        #shop {
            width: 90%; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px); border-radius: 25px;
            padding: 20px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            color: black; border: none; padding: 12px; margin: 6px 0;
            border-radius: 12px; font-weight: bold; width: 100%;
            box-shadow: 0 4px 10px rgba(0, 255, 204, 0.3);
            cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-box">
            <div id="score">0</div>
            <div id="power-text">КЛИК: +<span id="p-val">1</span> | АВТО: <span id="a-val">0</span>/с</div>
        </div>
        
        <div id="click-area" onclick="handleTouch(event)">💎</div>

        <div id="shop">
            <p style="margin-top: 0; font-size: 14px; letter-spacing: 1px;">МАГАЗИН УЛУЧШЕНИЙ</p>
            <button id="up1" class="btn" onclick="buy(1)">⚡ СИЛА КЛИКА +5 (Цена: <span id="p-price">50</span>)</button>
            <button id="up2" class="btn" onclick="buy(2)">🤖 АВТО-КЛИКЕР (Цена: <span id="a-price">150</span>)</button>
            <button class="btn" onclick="showAd()" style="background: linear-gradient(90deg, #ff00ff, #7700ff); color: white; margin-top: 10px;">📺 +50 МОНЕТ ЗА РЕКЛАМУ</button>
        </div>
    </div>

    <script>
        // --- ПЕРЕМЕННЫЕ ИГРЫ ---
        let coins = 0;
        let power = 1;
        let autoIncome = 0;
        
        let powerPrice = 50;
        let autoPrice = 150;

        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ЛОГИКА ТАПА И АНИМАЦИЯ ---
        function handleTouch(e) {
            coins += power;
            createCoinEffect(e);
            updateUI();
        }

        function createCoinEffect(e) {
            const coin = document.createElement('div');
            coin.classList.add('coin-particle');
            coin.innerText = '💰'; // Монета вылетает
            
            // Определяем координаты клика
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            
            coin.style.left = x + 'px';
            coin.style.top = y + 'px';
            
            document.body.appendChild(coin);
            
            // Удаляем монету из кода после анимации
            setTimeout(() => coin.remove(), 800);
        }

        // --- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА (UI) ---
        function updateUI() {
            document.getElementById('score').innerText = Math.floor(coins);
            document.getElementById('p-val').innerText = power;
            document.getElementById('a-val').innerText = autoIncome;
            
            document.getElementById('p-price').innerText = powerPrice;
            document.getElementById('a-price').innerText = autoPrice;
            
            // Блокируем кнопки, если нет денег
            document.getElementById('up1').disabled = coins < powerPrice;
            document.getElementById('up2').disabled = coins < autoPrice;
        }

        // --- ЛОГИКА МАГАЗИНА ---
        function buy(type) {
            if (type === 1 && coins >= powerPrice) {
                coins -= powerPrice;
                power += 5; // Увеличиваем силу клика
                powerPrice = Math.floor(powerPrice * 1.5); // Цена растет
                tg.HapticFeedback.notificationOccurred('success'); // Вибрация
            } 
            else if (type === 2 && coins >= autoPrice) {
                coins -= autoPrice;
                autoIncome += 1; // Увеличиваем авто-доход
                autoPrice = Math.floor(autoPrice * 1.8); // Цена растет
                tg.HapticFeedback.notificationOccurred('success'); // Вибрация
            }
            updateUI();
        }

        // --- АВТО-КЛИКЕР (Каждую секунду) ---
        setInterval(() => {
            if (autoIncome > 0) {
                coins += autoIncome;
                updateUI();
            }
        }, 1000);

        // --- РЕКЛАМА ADSGRAM (С твоим ID 25802) ---
        const AdController = window.AdsGram.init({ blockId: "25802" });

        function showAd() {
            AdController.show().then(() => {
                coins += 50; 
                tg.showAlert("Поздравляем! Вы получили 50 монет!");
                updateUI();
            }).catch(() => {
                tg.showAlert("Реклама пока не доступна.");
            });
        }
        
        // Первое обновление при запуске
        updateUI();
    </script>
</body>
</html>
