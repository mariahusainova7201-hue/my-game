<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Hero: Runner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { margin: 0; background: #050510; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; touch-action: none; user-select: none; }
        #game-container { display: none; position: relative; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; box-sizing: border-box; }
        
        #music-btn { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; z-index: 1000; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #score-container { margin-top: 10px; z-index: 50; }
        #score { font-size: 45px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,204,0.5); }
        
        .bar-bg { width: 100%; height: 8px; background: #1a1a2e; border-radius: 4px; margin: 5px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        #evo-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.5s; }

        /* ЧЕЛОВЕЧЕК (Добавили движение) */
        #hero-container { 
            position: absolute; bottom: 120px; left: 50%; 
            width: 80px; height: 80px; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center; 
            z-index: 100; transition: left 0.1s ease-out; /* Плавное движение */
        }
        #main-hero { font-size: 60px; filter: drop-shadow(0 0 15px rgba(0,255,204,0.3)); }
        
        /* КРИСТАЛЛЫ (Падающие) */
        .crystal { position: absolute; width: 30px; height: 30px; background: #ff00ff; border-radius: 50%; box-shadow: 0 0 15px #ff00ff; z-index: 40; }

        /* Кнопки магазина */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; z-index: 150; position: absolute; bottom: 10px; padding: 0 20px; box-sizing: border-box; }
        .btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 5px; border-radius: 12px; font-size: 11px; outline: none; cursor: pointer; }
        .ad-btn { grid-column: span 2; background: linear-gradient(135deg, #7700ff, #ff00ff); border: none; font-weight: bold; height: 50px; font-size: 14px; }

        .overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="music-btn" onclick="toggleMusic()">🔇</div>
    
    <div id="intro-screen" class="overlay">
        <h1 style="color:#00ffcc; letter-spacing:2px;">CYBER HERO</h1>
        <p style="color:#fff; font-size:16px; margin-bottom:30px;">Лови кристаллы и эволюционируй!</p>
        <button class="btn ad-btn" style="width:220px;" onclick="startGame()">НАЧАТЬ</button>
    </div>

    <div id="game-container">
        <div id="score-container">
            <div id="era-label" style="font-size:12px; color:#ff00ff; text-transform:uppercase; letter-spacing:2px;">Эра: Зарождение</div>
            <div id="score">0</div>
            <div class="bar-bg"><div id="evo-fill"></div></div>
        </div>

        <div id="hero-container">
            <div id="main-hero">👶</div>
        </div>

        <div class="shop-grid">
            <button id="up1" class="btn" onclick="boostSpeed()">⚡ СКОРОСТЬ<br><span id="s-price">100</span> 💰</button>
            <button id="ad-btn" class="btn ad-btn" onclick="showAd()">📺 ЗАРЯДИТЬ ГЕРОЯ (+500 💰)</button>
        </div>
    </div>

    <script>
        let coins = 0;
        let era = 1;
        let isMusicPlaying = false;
        let gameActive = false;
        let fallSpeed = 6;
        let sPrice = 100;

        const heroes = ["👶", "👦", "🦾", "🤖", "👑"]; 
        const eras = ["Зарождение", "Техно", "Киберпанк", "Сингулярность", "Божество"];
        const targets = [500, 5000, 50000, 500000, 99999999]; // Изменили цели для раннера

        const tg = window.Telegram.WebApp;
        
        // РЕКЛАМА (Убедись, что ID: 25872)
        const AdController = window.AdsGram.init({ blockId: "25872" });

        // Запуск игры
        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            gameActive = true;
            fallSpeed = 6;
            document.getElementById('bg-music').play().catch(() => {});
            startSpawning();
        }

        // ДВИЖЕНИЕ: Герой следует за пальцем (влево-вправо)
        document.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            let touchX = e.touches[0].clientX;
            let hero = document.getElementById('hero-container');
            let newX = touchX - 40; // Центрируем
            newX = Math.max(0, Math.min(newX, window.innerWidth - 80));
            hero.style.left = newX + 'px';
        });

        // Создание падающих кристаллов
        function createCrystal() {
            if (!gameActive) return;
            const c = document.createElement('div');
            c.className = 'crystal';
            c.innerText = "💎"; // Эмодзи кристалла
            c.style.display = 'flex'; c.style.alignItems = 'center'; c.style.justifyContent = 'center';
            c.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            c.style.top = '-40px';
            document.getElementById('game-container').appendChild(c);

            let top = -40;
            const fall = setInterval(() => {
                if (!gameActive) { clearInterval(fall); c.remove(); return; }
                top += fallSpeed;
                c.style.top = top + 'px';

                let pRect = document.getElementById('hero-container').getBoundingClientRect();
                let cRect = c.getBoundingClientRect();

                // СТОЛКНОВЕНИЕ: Поймал кристалл
                if (cRect.bottom > pRect.top && cRect.left < pRect.right && cRect.right > pRect.left && cRect.top < pRect.bottom) {
                    coins += 10; // Даем +10 монет за кристалл
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    updateUI();
                    clearInterval(fall);
                    c.remove();
                    return;
                }

                // Упал мимо
                if (top > window.innerHeight) {
                    clearInterval(fall);
                    c.remove();
                }
            }, 20);
        }

        // Цикл появления кристаллов
        function startSpawning() {
            if(!gameActive) return;
            createCrystal();
            setTimeout(startSpawning, 1200);
        }

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if (isMusicPlaying) { m.pause(); btn.innerText = "🔇"; }
            else { m.play().catch(() => {}); btn.innerText = "🔊"; }
            isMusicPlaying = !isMuted;
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(coins);
            document.getElementById('main-hero').innerText = heroes[era-1];
            document.getElementById('era-label').innerText = "Эра: " + eras[era-1];
            document.getElementById('evo-fill').style.width = Math.min((coins/targets[era-1]*100), 100) + '%';
            document.getElementById('s-price').innerText = sPrice;

            // ЭВОЛЮЦИЯ
            if (coins >= targets[era-1] && era < 5) {
                era++; coins = 0; fallSpeed += 0.5;
                if(tg.showAlert) tg.showAlert("ЭВОЛЮЦИЯ ГЕРОЯ!");
            }
        }

        // МАГАЗИН: Увеличение скорости падения (чтобы быстрее фармить)
        function boostSpeed() {
            if(coins >= sPrice){
                coins -= sPrice;
                fallSpeed += 1;
                sPrice = Math.floor(sPrice * 2);
                updateUI();
            }
        }

        // РЕКЛАМА: Дает +500 монет
        function showAd() {
            const btn = document.getElementById('ad-btn');
            btn.innerText = "ЗАГРУЗКА...";
            AdController.show().then(() => {
                coins += 500;
                updateUI();
                btn.innerText = "📺 ЗАРЯДИТЬ ГЕРОЯ (+500 💰)";
            }).catch(() => {
                if(tg.showAlert) tg.showAlert("Реклама готовится, подождите немного...");
                btn.innerText = "📺 ЗАРЯДИТЬ ГЕРОЯ (+500 💰)";
            });
        }

        // Музыка на старте
        tg.ready();
    </script>
</body>
</html>
