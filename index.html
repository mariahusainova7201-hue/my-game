<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Forest Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0e0e1a; background-image: url('https://files.oaiusercontent.com/file-77e1cb0b-8d47-4c61-8df6-8311a0fe21e5'); background-size: cover; background-position: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; text-align: center; }
        #game-container { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; background: rgba(0, 0, 0, 0.3); }
        #score-box { margin-top: 50px; }
        #score { font-size: 60px; font-weight: 900; text-shadow: 0 0 20px #00ffcc; }
        #click-area { width: 210px; height: 210px; background: radial-gradient(circle, #ff00ff, #7700ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 90px; box-shadow: 0 0 50px rgba(119, 0, 255, 0.7); cursor: pointer; transition: transform 0.05s; user-select: none; position: relative; }
        #click-area:active { transform: scale(0.92); }
        .coin-particle { position: absolute; color: #FFD700; font-weight: bold; font-size: 30px; pointer-events: none; animation: moveCoin 0.8s ease-out forwards; }
        @keyframes moveCoin { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150px) scale(0.5); opacity: 0; } }
        #shop { width: 90%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); border-radius: 25px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { background: linear-gradient(90deg, #00ffcc, #00ccff); color: black; border: none; padding: 12px; margin: 6px 0; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn:disabled { background: #444; color: #888; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-box">
            <div id="score">0</div>
            <div style="color: #00ffcc; opacity: 0.8;">КЛИК: +<span id="p-val">1</span> | АВТО: <span id="a-val">0</span>/с</div>
        </div>
        <div id="click-area" onclick="handleTouch(event)">💎</div>
        <div id="shop">
            <button id="up1" class="btn" onclick="buy(1)">⚡ СИЛА КЛИКА +5 (Цена: <span id="p-price">50</span>)</button>
            <button id="up2" class="btn" onclick="buy(2)">🤖 АВТО-КЛИКЕР (Цена: <span id="a-price">150</span>)</button>
            <button id="ad-btn" class="btn" onclick="showAd()" style="background: linear-gradient(90deg, #ff00ff, #7700ff); color: white;">📺 +50 МОНЕТ ЗА РЕКЛАМУ</button>
        </div>
    </div>

    <script>
        let coins = 0;
        let power = 1;
        let autoIncome = 0;
        let powerPrice = 50;
        let autoPrice = 150;
        const tg = window.Telegram.WebApp;
        tg.expand();

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(coins);
            document.getElementById('p-val').innerText = power;
            document.getElementById('a-val').innerText = autoIncome;
            document.getElementById('p-price').innerText = powerPrice;
            document.getElementById('a-price').innerText = autoPrice;
            document.getElementById('up1').disabled = coins < powerPrice;
            document.getElementById('up2').disabled = coins < autoPrice;
        }

        function handleTouch(e) {
            coins += power;
            createCoinEffect(e);
            updateUI();
        }

        function createCoinEffect(e) {
            const coin = document.createElement('div');
            coin.className = 'coin-particle';
            coin.innerText = '💰';
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            coin.style.left = x + 'px';
            coin.style.top = y + 'px';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 800);
        }

        function buy(type) {
            if (type === 1 && coins >= powerPrice) {
                coins -= powerPrice; power += 5; powerPrice = Math.floor(powerPrice * 1.5);
            } else if (type === 2 && coins >= autoPrice) {
                coins -= autoPrice; autoIncome += 1; autoPrice = Math.floor(autoPrice * 1.8);
            }
            updateUI();
        }

        setInterval(() => { if (autoIncome > 0) { coins += autoIncome; updateUI(); } }, 1000);

        // --- РЕКЛАМА ---
        function showAd() {
            if (!window.AdsGram) {
                tg.showAlert("Реклама еще грузится...");
                return;
            }
            const controller = window.AdsGram.init({ blockId: "25802" });
            controller.show()
                .then(() => {
                    coins += 50;
                    updateUI();
                    tg.showAlert("Успех! +50 монет.");
                })
                .catch((e) => {
                    console.log(e);
                    tg.showAlert("Реклама пока не готова.");
                });
        }
        updateUI();
    </script>
</body>
</html>
